name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache SunVox library
        uses: actions/cache@v4
        with:
          path: var/sunvox_lib-2.1.4d.zip
          key: sunvox-lib-2.1.4d-abe851de9d65a10e06673bf33257154591a2ff63ad2bb298488a5941cc5f4057

      - name: Install SunVox library
        run: sh scripts/install_sunvox_lib.sh

      - name: Check license notices
        run: npm run licenses:check

      - name: Test
        run: npm test

      - name: Check SunVox DB
        run: npm run sunvox:inspect -- check

      - name: Check SunVox controller metadata
        run: npm run sunvox:controller-diff

      - name: Check SunVox coverage
        run: npm run sunvox:coverage:check

      - name: Verify SunVox samples
        run: npm run sunvox:verify:all

      - name: Build frontend
        run: npm run build

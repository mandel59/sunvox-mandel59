name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache SunVox library
        uses: actions/cache@v4
        with:
          path: var/sunvox_lib-2.1.4d.zip
          key: sunvox-lib-2.1.4d-abe851de9d65a10e06673bf33257154591a2ff63ad2bb298488a5941cc5f4057

      - name: Install SunVox library
        run: sh scripts/install_sunvox_lib.sh

      - name: Check license notices
        run: npm run licenses:check

      - name: Test
        run: npm test

      - name: Check SunVox DB
        run: npm run sunvox:inspect -- check

      - name: Check SunVox controller metadata
        run: npm run sunvox:controller-diff

      - name: Check SunVox coverage
        run: npm run sunvox:coverage:check

      - name: Verify SunVox samples
        run: npm run sunvox:verify:all

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache SunVox library
        uses: actions/cache@v4
        with:
          path: var/sunvox_lib-2.1.4d.zip
          key: sunvox-lib-2.1.4d-abe851de9d65a10e06673bf33257154591a2ff63ad2bb298488a5941cc5f4057

      - name: Install SunVox library
        run: sh scripts/install_sunvox_lib.sh

      - name: Build
        run: npm run build
        env:
          PAGES_BASE_PATH: ./

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
